<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy"
  content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline';">
<title>フォルダ構成図メーカー</title>
<style>
* { box-sizing: border-box; }
body { font-family: Consolas, monospace; margin: 0; padding: 10px;
       transition: background-color 0.3s, color 0.3s; }

#toolbar {
  display: flex; flex-wrap: wrap; align-items: center;
  gap: 6px; margin-bottom: 8px;
}

#controls {
  display: flex; flex-wrap: wrap; align-items: center;
  gap: 10px; padding: 8px 10px; border-radius: 4px;
  font-size: 0.88em; margin-bottom: 8px;
}
#depthGroup { display: flex; align-items: center; gap: 6px; }
#depthRange { width: 90px; cursor: pointer; accent-color: #4ec9b0; }
#depthVal   { min-width: 1.3em; text-align: center; font-weight: bold; }
#excludeGroup { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
#excludeGroup label {
  display: flex; align-items: center; gap: 3px;
  cursor: pointer; white-space: nowrap; user-select: none;
}
#customExclude { width: 180px; padding: 2px 6px; font-family: inherit; font-size: 0.95em; border-radius: 3px; }
#applyBtn { padding: 3px 10px; font-size: 0.88em; }

#tree { border: 1px solid; padding: 10px; height: 430px; overflow: auto; margin-top: 0; }
ul   { list-style-type: none; padding-left: 1em; }
summary { cursor: pointer; }

body.dark  { background: #1e1e1e; color: #ddd; }
body.dark #tree    { border-color: #555; }
body.dark #controls { background: #252526; border: 1px solid #3c3c3c; }
body.dark button, body.dark select, body.dark input[type="text"] {
  background: #333; color: #ddd; border: 1px solid #555; border-radius: 3px;
}

body.light { background: #fff; color: #000; }
body.light #tree    { border-color: #ccc; }
body.light #controls { background: #f5f5f5; border: 1px solid #ddd; }
body.light button, body.light select, body.light input[type="text"] {
  background: #eee; color: #000; border: 1px solid #ccc; border-radius: 3px;
}

button { padding: 5px 10px; cursor: pointer; }

#toast {
  position: fixed; bottom: 20px; right: 20px;
  padding: 10px 15px; background: #333; color: #fff;
  border-radius: 5px; opacity: 0; transition: opacity 0.3s;
  pointer-events: none; font-size: 0.9em;
}
</style>
</head>
<body>

  <div id="toolbar">
    <button id="selectBtn">フォルダを選択</button>
    <button id="copyBtn">MDコピー</button>
    <button id="saveBtn">保存</button>
    <select id="formatSelect" title="保存形式">
      <option value="txt">TXT</option>
      <option value="json">JSON</option>
      <option value="html">HTML</option>
    </select>
    <button id="themeBtn">モード切替</button>
    <label for="langSelect">言語:</label>
    <select id="langSelect">
      <option value="auto">Auto</option>
      <option value="ja">日本語</option>
      <option value="en">English</option>
      <option value="zh-CN">简体中文</option>
      <option value="zh-TW">繁體中文</option>
      <option value="ko">한국어</option>
      <option value="es">Español</option>
      <option value="fr">Français</option>
      <option value="de">Deutsch</option>
    </select>
  </div>

  <div id="controls">

    <div id="depthGroup">
      <span id="depthLabel">表示階層:</span>
      <input type="range" id="depthRange" min="1" max="8" value="4">
      <span id="depthVal">4</span>
    </div>

    <span id="excludeLabel">除外:</span>
    <div id="excludeGroup">
      <label><input type="checkbox" class="excludeCheck" value=".git"          checked> .git</label>
      <label><input type="checkbox" class="excludeCheck" value="node_modules"  checked> node_modules</label>
      <label><input type="checkbox" class="excludeCheck" value="dist">                  dist</label>
      <label><input type="checkbox" class="excludeCheck" value=".next">                 .next</label>
      <label><input type="checkbox" class="excludeCheck" value="__pycache__">           __pycache__</label>
      <label><input type="checkbox" class="excludeCheck" value=".venv">                 .venv</label>
      <input type="text" id="customExclude" placeholder="カスタム除外（カンマ区切り）">
      <button id="applyBtn">適用</button>
    </div>

  </div>

  <div id="tree"></div>
  <div id="toast"></div>
  <script src="renderer.js"></script>
</body>
</html>
